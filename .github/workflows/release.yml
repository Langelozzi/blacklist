name: Build and Release Blacklist CLI

on:
  push:
    tags:
      - 'v*' # Trigger only when you push a tag starting with 'v' (e.g., v1.0.0)

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: blacklist-linux
            asset_name: blacklist-linux
          - os: windows-latest
            artifact_name: blacklist.exe
            asset_name: blacklist-windows.exe
          - os: macos-latest
            artifact_name: blacklist
            asset_name: blacklist-macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name blacklist --add-data "VERSION:." blacklist.py

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: mv dist/blacklist dist/${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: ren dist\blacklist.exe ${{ matrix.asset_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/blacklist-linux/blacklist-linux
            release-assets/blacklist-windows.exe/blacklist-windows.exe
            release-assets/blacklist-macos/blacklist-macos
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
